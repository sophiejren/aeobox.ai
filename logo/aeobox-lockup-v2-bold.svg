<?xml version="1.0" encoding="UTF-8"?>
<!-- V2 · BOLD EDITORIAL — typographic brackets with prominent serif terminals, paired chunky quotes, custom-drawn wordmark with optical balance -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 140" role="img" aria-label="AEObox">
