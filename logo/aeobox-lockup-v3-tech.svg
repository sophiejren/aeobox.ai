<?xml version="1.0" encoding="UTF-8"?>
<!-- V3 · ENGINEERED TECH — code-style brackets, sharp geometry, monospace-influenced wordmark with consistent vertical stress -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 140" role="img" aria-label="AEObox">
  <title>AEObox</title>
  <defs>
    <linearGradient id="v3g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
  </defs>

  <!-- ============ MARK [A] · sharp tech brackets ============ -->
  <g transform="translate(0, 0)">
    <!-- Left bracket — thick vertical with sharp top/bottom tabs -->
    <rect x="22" y="22" width="14" height="96" fill="url(#v3g)"/>
    <rect x="22" y="22" width="32" height="10" fill="url(#v3g)"/>
    <rect x="22" y="108" width="32" height="10" fill="url(#v3g)"/>

    <!-- Right bracket -->
    <rect x="164" y="22" width="14" height="96" fill="url(#v3g)"/>
    <rect x="146" y="22" width="32" height="10" fill="url(#v3g)"/>
    <rect x="146" y="108" width="32" height="10" fill="url(#v3g)"/>

    <!-- A — sharp apex, no serifs -->
    <path d="M 100 26 L 60 118 L 76 118 L 84 96 L 116 96 L 124 118 L 140 118 Z M 88 84 L 112 84 L 100 56 Z" fill="#F5F7FA"/>

    <!-- Quotes as parallel vertical bars — monospace " style -->
    <rect x="82" y="62" width="5" height="20" rx="1" fill="#00D4FF"/>
    <rect x="91" y="62" width="5" height="20" rx="1" fill="#00D4FF"/>
    <rect x="104" y="62" width="5" height="20" rx="1" fill="#7C5CFF"/>
    <rect x="113" y="62" width="5" height="20" rx="1" fill="#7C5CFF"/>
  </g>

  <!-- ============ WORDMARK · geometric sans, monospace-influenced ============ -->
  <g transform="translate(210, 32)" fill="#F5F7FA">
    <!-- A — sharp -->
    <path d="M 0 76 L 30 0 L 42 0 L 72 76 L 58 76 L 51 56 L 21 56 L 14 76 Z M 26 44 L 46 44 L 36 17 Z"/>
    <!-- E -->
    <path d="M 84 0 L 134 0 L 134 12 L 96 12 L 96 32 L 128 32 L 128 44 L 96 44 L 96 64 L 134 64 L 134 76 L 84 76 Z"/>
    <!-- O — geometric, sharp inner corners suggest "engineered" -->
    <path d="M 184 0 C 162 0 148 17 148 38 C 148 59 162 76 184 76 C 206 76 220 59 220 38 C 220 17 206 0 184 0 Z M 184 12 C 199 12 208 23 208 38 C 208 53 199 64 184 64 C 169 64 160 53 160 38 C 160 23 169 12 184 12 Z"/>
    <!-- b -->
    <path d="M 232 0 L 244 0 L 244 30 C 248 26 254 22 264 22 C 280 22 290 35 290 50 C 290 65 280 78 264 78 C 254 78 248 74 244 70 L 244 76 L 232 76 Z M 261 33 C 252 33 244 41 244 50 C 244 59 252 67 261 67 C 270 67 278 59 278 50 C 278 41 270 33 261 33 Z"/>
    <!-- o -->
    <path d="M 322 22 C 307 22 296 35 296 50 C 296 65 307 78 322 78 C 337 78 348 65 348 50 C 348 35 337 22 322 22 Z M 322 33 C 331 33 336 41 336 50 C 336 59 331 67 322 67 C 313 67 308 59 308 50 C 308 41 313 33 322 33 Z"/>
    <!-- x -->
    <path d="M 354 24 L 368 24 L 380 41 L 392 24 L 406 24 L 387 49 L 408 76 L 393 76 L 380 58 L 367 76 L 352 76 L 373 49 Z"/>
  </g>
</svg>
