<?xml version="1.0" encoding="UTF-8"?>
<!-- V4.1 · V4 polished — keeps premium minimalist feel, BUT optimized for legibility at small sizes. Quotes are larger and chunkier. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 140" role="img" aria-label="AEObox">
  <title>AEObox</title>
  <defs>
    <linearGradient id="v41g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <linearGradient id="v41q" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#7C5CFF"/>
    </linearGradient>
  </defs>

  <!-- ============ MARK [A] · refined brackets + visible quotes ============ -->
  <g transform="translate(0, 0)">
    <!-- Left bracket: cleaner, with elegant inner notch -->
    <path d="M 58 22 L 24 22 L 24 118 L 58 118 L 58 110 L 34 110 L 34 30 L 58 30 Z" fill="url(#v41g)"/>
    <!-- Right bracket -->
    <path d="M 142 22 L 176 22 L 176 118 L 142 118 L 142 110 L 166 110 L 166 30 L 142 30 Z" fill="url(#v41g)"/>

    <!-- A — refined geometry, slightly heavier than V4 for balance -->
    <path d="M 100 26 L 62 118 L 78 118 L 86 96 L 114 96 L 122 118 L 138 118 Z M 90 84 L 110 84 L 100 58 Z" fill="#F5F7FA"/>

    <!-- LARGER chunky paired quotes — visible even at 28px nav size -->
    <g fill="url(#v41q)">
      <!-- Opening "66" — solid filled quote shape -->
      <path d="M 78 58 Q 70 58 70 68 Q 70 75 75 80 L 82 86 L 86 80 Q 90 76 90 70 Q 90 58 84 58 Z"/>
      <path d="M 81 80 L 76 88 L 80 88 L 86 82 Z"/>
      <!-- Closing "99" -->
