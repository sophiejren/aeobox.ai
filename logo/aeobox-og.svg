<?xml version="1.0" encoding="UTF-8"?>
<!-- AEObox OG image · 1200×630 · 4A REDESIGN
     Principle: one focal point, generous negative space, no clutter.
     The bracketed [A] is the hero — oversized to "art piece" scale (≈420px tall).
     One bold phrase, one credit line. Nothing else. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="AEObox · Get cited by AI">
  <title>AEObox · Get cited by AI</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0B14"/>
      <stop offset="100%" stop-color="#10121F"/>
    </linearGradient>
    <!-- Single subtle accent glow, NOT decorative — just to add depth -->
    <radialGradient id="glow" cx="0.32" cy="0.5" r="0.45">
      <stop offset="0%" stop-color="rgba(124,92,255,0.20)"/>
      <stop offset="100%" stop-color="rgba(10,11,20,0)"/>
    </radialGradient>
    <linearGradient id="mk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <linearGradient id="mq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#7C5CFF"/>
    </linearGradient>
  </defs>

  <!-- ====== Background ====== -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- ====== HERO: oversized bracketed [A] ====== -->
  <!-- Mark viewBox 200×140; we scale 3.4× and position left ≈ 80, vertically centered around y=200 -->
  <g transform="translate(94, 110) scale(3.0)">
    <path d="M 58 22 L 24 22 L 24 118 L 58 118 L 58 110 L 34 110 L 34 30 L 58 30 Z" fill="url(#mk)"/>
    <path d="M 142 22 L 176 22 L 176 118 L 142 118 L 142 110 L 166 110 L 166 30 L 142 30 Z" fill="url(#mk)"/>
    <path d="M 100 26 L 62 118 L 78 118 L 86 96 L 114 96 L 122 118 L 138 118 Z M 90 84 L 110 84 L 100 58 Z" fill="#F5F7FA"/>
    <g fill="url(#mq)">
      <path d="M 78 58 Q 70 58 70 68 Q 70 75 75 80 L 82 86 L 86 80 Q 90 76 90 70 Q 90 58 84 58 Z"/>
      <path d="M 81 80 L 76 88 L 80 88 L 86 82 Z"/>
      <path d="M 122 86 Q 130 86 130 76 Q 130 69 125 64 L 118 58 L 114 64 Q 110 68 110 74 Q 110 86 116 86 Z"/>
      <path d="M 119 64 L 124 56 L 120 56 L 114 62 Z"/>
    </g>
  </g>

  <!-- ====== ONE PHRASE · right side, vertically centered ====== -->
  <text x="720" y="298" fill="#F5F7FA"
        font-family="Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
        font-size="76" font-weight="800" letter-spacing="-3">Get cited</text>
  <text x="720" y="380" fill="#F5F7FA"
        font-family="Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
        font-size="76" font-weight="800" letter-spacing="-3">by AI.</text>

  <!-- ====== Tiny credit · bottom right ====== -->
  <text x="720" y="498" fill="#6B7280"
        font-family="'JetBrains Mono', Menlo, monospace"
        font-size="14" font-weight="500" letter-spacing="0.16em">
    AEOBOX · ANSWER ENGINE OPTIMIZATION
  </text>
  <text x="720" y="528" fill="#9CA3AF"
        font-family="Inter, system-ui, sans-serif"
        font-size="16" font-weight="500">
    aeobox.ai
  </text>
</svg>
