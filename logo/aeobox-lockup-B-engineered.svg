<?xml version="1.0" encoding="UTF-8"?>
<!-- DIRECTION B · ENGINEERED — Wordmark uses monospace-influenced uniform geometry. All letters drawn to equal optical width, square corners, uniform stroke. Conveys: AI-system native, precise, engineered. Like Vercel / Linear / OpenAI's docs typography. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 140" role="img" aria-label="AEObox">
  <title>AEObox</title>
  <defs>
    <linearGradient id="Bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7C5CFF"/><stop offset="100%" stop-color="#00D4FF"/></linearGradient>
    <linearGradient id="Bq" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00D4FF"/><stop offset="100%" stop-color="#7C5CFF"/></linearGradient>
  </defs>

  <!-- MARK -->
  <g transform="translate(0, 0)">
    <path d="M 58 22 L 24 22 L 24 118 L 58 118 L 58 110 L 34 110 L 34 30 L 58 30 Z" fill="url(#Bg)"/>
    <path d="M 142 22 L 176 22 L 176 118 L 142 118 L 142 110 L 166 110 L 166 30 L 142 30 Z" fill="url(#Bg)"/>
    <path d="M 100 26 L 62 118 L 78 118 L 86 96 L 114 96 L 122 118 L 138 118 Z M 90 84 L 110 84 L 100 58 Z" fill="#F5F7FA"/>
    <g fill="url(#Bq)">
      <path d="M 78 58 Q 70 58 70 68 Q 70 75 75 80 L 82 86 L 86 80 Q 90 76 90 70 Q 90 58 84 58 Z"/>
      <path d="M 81 80 L 76 88 L 80 88 L 86 82 Z"/>
      <path d="M 122 86 Q 130 86 130 76 Q 130 69 125 64 L 118 58 L 114 64 Q 110 68 110 74 Q 110 86 116 86 Z"/>
      <path d="M 119 64 L 124 56 L 120 56 L 114 62 Z"/>
    </g>
  </g>

  <!-- WORDMARK · Mono-influenced uniform geometry. Each letter ~62px wide. Square cuts. No flourishes. -->
  <g transform="translate(212, 32)" fill="#F5F7FA">
    <!-- A — equal width to other letters, square base, no serifs -->
    <path d="M 0 76 L 26 0 L 36 0 L 62 76 L 50 76 L 45 58 L 17 58 L 12 76 Z M 21 46 L 41 46 L 31 16 Z"/>
    <!-- E — same width, sharp 90° corners -->
    <path d="M 76 0 L 138 0 L 138 12 L 88 12 L 88 32 L 132 32 L 132 44 L 88 44 L 88 64 L 138 64 L 138 76 L 76 76 Z"/>
    <!-- O — squarish, not circle. Monospace O is usually rectangle-with-rounded-corners -->
    <path d="M 152 0 L 214 0 L 214 76 L 152 76 Z M 164 12 L 164 64 L 202 64 L 202 12 Z"/>
    <!-- b — straight stem, square bowl (monospace style) -->
    <path d="M 228 0 L 240 0 L 240 26 L 280 26 L 280 76 L 228 76 Z M 240 38 L 240 64 L 268 64 L 268 38 Z"/>
    <!-- o — same square shape as O but smaller, x-height -->
    <path d="M 296 22 L 348 22 L 348 76 L 296 76 Z M 308 34 L 308 64 L 336 64 L 336 34 Z"/>
    <!-- x — two crossing rectangles, no fancy meeting -->
    <path d="M 362 22 L 376 22 L 384 38 L 392 22 L 406 22 L 392 49 L 408 76 L 394 76 L 384 60 L 374 76 L 360 76 L 376 49 Z"/>
    <!-- BRACKET WRAPPERS — entire wordmark is "in brackets" — reinforces citation theme without being heavy -->
    <g fill="url(#Bq)" opacity="0.55">
      <rect x="-14" y="0" width="2" height="76"/>
      <rect x="-14" y="0" width="6" height="2"/>
      <rect x="-14" y="74" width="6" height="2"/>
      <rect x="420" y="0" width="2" height="76"/>
      <rect x="416" y="0" width="6" height="2"/>
      <rect x="416" y="74" width="6" height="2"/>
    </g>
  </g>
</svg>
